 <div class="container">

    <div class="mt-5 grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
      @for (product of productList(); track  product._id) {
        <app-card [product]="product"></app-card>

    </div>
  </div>
</section>
