<section class="relative overflow-hidden">

  <!-- green gradient overlay -->
  <div class="absolute inset-0 bg-linear-to-br from-primary to-[#4ade80]"></div>

  <!-- content -->
  <div class="relative container mx-auto px-4 py-12 sm:py-16">

    <!-- breadcrumb -->
    <nav class="flex items-center gap-2 text-sm text-white/70 mb-6 flex-wrap">
      <a routerLink="/" class="hover:text-white transition-colors">Home</a>
      <span class="text-white/40">/</span>
      <a routerLink="/brands" class="hover:text-white transition-colors">Brands</a>
      <span class="text-white/40">/</span>
      <span class="text-white font-medium">{{brandDetails().name}}</span>
    </nav>

    <!-- header -->
    <div class="flex items-center gap-5">

      <!-- icon -->
      <div
        class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-md flex items-center justify-center shadow-xl ring-1 ring-white/30"
      >
        <img [src]="brandDetails().image" [alt]="brandDetails().name" class="w-10 h-13">
      </div>

      <!-- text -->
      <div>
        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-white">
          {{brandDetails().name}}
        </h1>

        <p class="text-white/80 mt-1 capitalize">
          Shop {{brandDetails().name}} products
        </p>
      </div>

    </div>

  </div>
</section>
<p class="m-5  text-md text-black">Showing {{brandProducts().length}} products </p>

 <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6  mb-10 ms-5">
@for (product of brandProducts(); track product._id) {
  <app-card [product]="product"></app-card>
}
@empty {
  <div class="col-span-full flex justify-center items-center h-full px-4">

    <div class="text-center w-full max-w-md mx-auto  rounded-2xl p-6 sm:p-8 ">

      <div class="mx-auto flex h-28 w-28 sm:h-32 sm:w-32 items-center justify-center rounded-full bg-gray-50 mb-6">
        <i class="fa-solid fa-box-open text-4xl sm:text-5xl text-gray-300"></i>
      </div>

      <h2 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-3 tracking-tight">
        No Products Found
      </h2>

      <p class="text-gray-500 mb-6 text-base sm:text-lg leading-relaxed">
        No products match your current filters.
      </p>

      <button
        routerLink="/shop"
        class="w-full sm:w-auto inline-flex items-center justify-center gap-3 rounded-2xl bg-emerald-600 px-6 py-3 text-sm sm:text-base font-semibold text-white transition-all duration-200 hover:bg-emerald-700 hover:-translate-y-0.5 focus:ring-4 focus:ring-emerald-100 shadow-sm hover:shadow-md cursor-pointer"
      >
        View All Products
      </button>

    </div>

  </div>
}
 </div>
